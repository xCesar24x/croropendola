<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oropéndola | El Alma de la Madera</title>
    
    <!-- FUENTES PREMIUM -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Uncial+Antiqua&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- LIBRERÍAS DE ANIMACIÓN (GSAP) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/Draggable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/Observer.min.js"></script>

    <style>
        :root {
            --oro: #eec12d;
            --oro-glow: rgba(238, 193, 45, 0.4);
            --madera-oscura: #1a0d0a;
            --blanco: #fcfaf7;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Libre Baskerville', serif;
            background-color: var(--madera-oscura);
            color: var(--blanco);
            overflow-x: hidden;
            overflow-y: auto; /* Permitir scroll */
            min-height: 100vh;
            width: 100vw;
            cursor: default;
        }

        /* FONDO ESPECTACULAR PARALLAX */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('premium_bg.png');
            background-size: cover;
            background-position: center;
            z-index: -2;
            transform: scale(1.1);
        }

        #bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent 30%, rgba(0,0,0,0.6) 100%);
            z-index: -1;
        }

        /* CONTENEDOR PRINCIPAL */
        main {
            position: relative;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 5vh 20px 80px; /* Padding lateral y fondo */
            z-index: 10;
        }

        /* HEADER & LOGO */
        .header-wrap {
            text-align: center;
            margin-bottom: 2rem;
            perspective: 1000px;
        }

        .logo-box {
            position: relative;
            width: 130px;
            height: 130px;
            margin: 0 auto 1.5rem;
            border-radius: 50%;
            padding: 5px;
            background: linear-gradient(135deg, var(--oro), transparent, var(--oro));
            box-shadow: 0 0 30px var(--oro-glow);
        }

        .logo-box img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            background: white;
            border: 2px solid var(--madera-oscura);
        }

        h1 {
            font-family: 'Uncial Antiqua', cursive;
            font-size: clamp(2.5rem, 8vw, 3.5rem);
            color: var(--oro);
            text-shadow: 0 5px 15px rgba(0,0,0,0.8);
            letter-spacing: 2px;
        }

        .tagline {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            opacity: 0.7;
            margin-top: 5px;
        }

        /* BOTONES ORGÁNICOS */
        .social-hub {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 90%;
            max-width: 400px;
            margin-bottom: 30px;
        }

        .btn-organic {
            position: relative;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            padding: 16px 25px;
            border-radius: 12px;
            text-decoration: none;
            color: var(--blanco);
            display: flex;
            align-items: center;
            gap: 20px;
            overflow: hidden;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        /* EL "GLOW" DE LA BETA */
        .btn-organic::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(238, 193, 45, 0.1), transparent);
            transition: left 0.6s ease;
        }

        .btn-organic:hover {
            border-color: var(--oro);
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(238, 193, 45, 0.15);
        }

        .btn-organic:hover::before {
            left: 100%;
        }

        .btn-organic i {
            font-size: 1.4rem;
            color: var(--oro);
            filter: drop-shadow(0 0 5px var(--oro-glow));
        }

        .btn-organic span {
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            font-size: 0.95rem;
            letter-spacing: 1px;
        }

        /* CAROUSEL KINÉTICO REVOLUCIONARIO */
        .carousel-container {
            position: relative; /* Flujo natural */
            margin-top: 20px;
            width: 100vw;
            height: clamp(200px, 35vh, 300px);
            overflow: hidden;
            display: flex;
            align-items: center;
        }

        .carousel-track {
            display: flex;
            height: 100%;
            align-items: center;
            gap: 20px;
            padding: 0 20px;
            will-change: transform;
        }

        .carousel-item {
            position: relative;
            width: 280px;
            height: 200px;
            flex-shrink: 0;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: border-color 0.4s ease;
        }

        .carousel-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.7) contrast(1.1);
            transition: transform 0.5s ease, filter 0.5s ease;
        }

        .carousel-item:hover {
            border-color: var(--oro);
        }

        .carousel-item:hover img {
            transform: scale(1.05);
            filter: brightness(1) contrast(1.1);
        }

        .carousel-label {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 15px;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            font-family: 'Montserrat', sans-serif;
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--oro);
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.4s ease;
        }

        .carousel-item:hover .carousel-label {
            opacity: 1;
            transform: translateY(0);
        }

        /* INDICADOR DE SCROLL */
        .scroll-hint {
            position: relative;
            margin-top: 40px;
            font-family: 'Uncial Antiqua', cursive;
            font-size: 0.8rem;
            color: var(--oro);
            opacity: 0.5;
            letter-spacing: 4px;
        }

        /* RESPONSIVE FINE TUNING */
        @media (max-width: 480px) {
            h1 { font-size: 2.2rem; }
            .logo-box { width: 110px; height: 110px; }
            .carousel-item { width: 220px; height: 160px; }
        }
    </style>
</head>
<body>

    <div id="bg-canvas"></div>
    <div id="bg-overlay"></div>

    <main>
        <header class="header-wrap">
            <div class="logo-box">
                <img src="logo.png.jpeg" alt="Oropéndola Logo">
            </div>
            <h1>Oropéndola</h1>
            <div class="tagline">Arte, Madera y Tradición</div>
        </header>

        <section class="social-hub">
            <a href="https://wa.me/50683336102" class="btn-organic" target="_blank">
                <i class="fab fa-whatsapp"></i>
                <span>PEDIDOS WHATSAPP</span>
            </a>
            <a href="https://www.instagram.com/croropendola/" class="btn-organic" target="_blank">
                <i class="fab fa-instagram"></i>
                <span>GALERÍA INSTAGRAM</span>
            </a>
            <a href="https://www.facebook.com/share/1BePMb6QJY/" class="btn-organic" target="_blank">
                <i class="fab fa-facebook-f"></i>
                <span>FACEBOOK OFICIAL</span>
            </a>
            <a href="mailto:oropendolartesanias@gmail.com" class="btn-organic">
                <i class="fas fa-envelope"></i>
                <span>CONTACTO DIRECTO</span>
            </a>
        </section>

        <div class="scroll-hint">✦ NUESTRAS OBRAS ✦</div>

        <div class="carousel-container">
            <div class="carousel-track" id="track">
                <!-- Los items se duplicarán para el loop infinito -->
                <div class="carousel-item"><img src="Casavictoriana1.jpeg" alt="Casa Victoriana"><div class="carousel-label">Victoriana</div></div>
                <div class="carousel-item"><img src="Casapachuca1.jpeg" alt="Casa Pachuca"><div class="carousel-label">Pachuca</div></div>
                <div class="carousel-item"><img src="Casatipica1.jpeg" alt="Casa Típica"><div class="carousel-label">Típica</div></div>
                <div class="carousel-item"><img src="Casacolonial1.jpeg" alt="Casa Colonial"><div class="carousel-label">Colonial</div></div>
                <div class="carousel-item"><img src="Casazocalo1.jpeg" alt="Casa Zócalo"><div class="carousel-label">Zócalo</div></div>
                <div class="carousel-item"><img src="Casaexpresidente1.jpeg" alt="Casa Ex Presidente"><div class="carousel-label">Patrimonio</div></div>
                <div class="carousel-item"><img src="Casaobrera1.jpeg" alt="Casa Obrera"><div class="carousel-label">Obrera</div></div>
            </div>
        </div>
    </main>

    <script>
        // CONFIGURACIÓN DE GSAP
        console.log("Iniciando Motor Kinético Oropéndola 2026...");

        // 1. Efecto Parallax Suave del Fondo
        gsap.to("#bg-canvas", {
            duration: 20,
            scale: 1.2,
            repeat: -1,
            yoyo: true,
            ease: "sine.inOut"
        });

        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 20;
            const y = (e.clientY / window.innerHeight - 0.5) * 20;
            gsap.to("#bg-canvas", { x: x, y: y, duration: 1, ease: "power1.out" });
        });

        // 2. Animación de Entrada de Elementos
        const tl = gsap.timeline();
        tl.from(".logo-box", { scale: 0, rotation: 180, duration: 1.5, ease: "elastic.out(1, 0.3)" })
          .from("h1", { y: 50, opacity: 0, duration: 1 }, "-=0.5")
          .from(".btn-organic", { 
              x: -50, 
              opacity: 0, 
              stagger: 0.1, 
              duration: 0.8, 
              ease: "power3.out" 
          }, "-=0.5")
          .from(".carousel-item", { 
              scale: 0.5, 
              opacity: 0, 
              stagger: 0.1, 
              duration: 1, 
              ease: "back.out(1.7)" 
          }, "-=1");

        // 3. CAROUSEL KINÉTICO INFINITO (Helper de GSAP modificado)
        function horizontalLoop(items, config) {
            items = gsap.utils.toArray(items);
            config = config || {};
            let tl = gsap.timeline({repeat: config.repeat, paused: config.paused, defaults: {ease: "none"}, onReverseComplete: () => tl.totalTime(tl.rawTime() + tl.duration() * 100)}),
                length = items.length,
                startX = items[0].offsetLeft,
                times = [],
                widths = [],
                xPercents = [],
                curIndex = 0,
                pixelsPerSecond = (config.speed || 1) * 100,
                snap = config.snap === false ? v => v : gsap.utils.snap(config.snap || 1),
                totalWidth, curX, distanceToStart, distanceToLoop, item, i;
            
            gsap.set(items, { 
                xPercent: (i, el) => {
                    let w = widths[i] = parseFloat(gsap.getProperty(el, "width", "px"));
                    xPercents[i] = snap(parseFloat(gsap.getProperty(el, "x", "px")) / w * 100 + gsap.getProperty(el, "xPercent"));
                    return xPercents[i];
                }
            });
            gsap.set(items, {x: 0});
            totalWidth = items[length-1].offsetLeft + xPercents[length-1] / 100 * widths[length-1] - startX + items[length-1].offsetWidth * gsap.getProperty(items[length-1], "scaleX") + (parseFloat(config.paddingRight) || 0);
            for (i = 0; i < length; i++) {
                item = items[i];
                curX = xPercents[i] / 100 * widths[i];
                distanceToStart = item.offsetLeft - startX + curX;
                distanceToLoop = distanceToStart + widths[i] * gsap.getProperty(item, "scaleX");
                tl.to(item, {xPercent: snap((curX - distanceToLoop) / widths[i] * 100), duration: distanceToLoop / pixelsPerSecond}, 0)
                  .fromTo(item, {xPercent: snap((curX - distanceToLoop + totalWidth) / widths[i] * 100)}, {xPercent: xPercents[i], duration: (curX - distanceToLoop + totalWidth - curX) / pixelsPerSecond, immediateRender: false}, distanceToLoop / pixelsPerSecond)
                  .add("label" + i, distanceToStart / pixelsPerSecond);
                times[i] = distanceToStart / pixelsPerSecond;
            }
            function toIndex(index, vars) {
                vars = vars || {};
                (Math.abs(index - curIndex) > length / 2) && (index += index > curIndex ? -length : length); // always go in the shortest direction
                let newIndex = gsap.utils.wrap(0, length, index),
                    time = times[newIndex];
                if (time > tl.time() !== index > curIndex) { // if we're wrapping the wrong way
                    vars.modifiers = {time: gsap.utils.unitize(gsap.utils.wrap(0, tl.duration()))};
                    time += tl.duration() * (index > curIndex ? 1 : -1);
                }
                curIndex = newIndex;
                vars.overwrite = true;
                return tl.tweenTo(time, vars);
            }
            tl.next = vars => toIndex(curIndex + 1, vars);
            tl.prev = vars => toIndex(curIndex - 1, vars);
            tl.current = () => curIndex;
            tl.toIndex = (index, vars) => toIndex(index, vars);
            tl.times = times;
            tl.progress(1, true).progress(0, true); // pre-render for performance
            if (config.reversed) {
              tl.vars.onReverseComplete();
              tl.reverse();
            }
            return tl;
        }

        const loop = horizontalLoop(".carousel-item", {
            speed: 0.6,
            repeat: -1,
            paddingRight: 20
        });

        // Interacción: Acelerar al pasar el mouse por el track
        const track = document.getElementById('track');
        track.addEventListener('mouseenter', () => {
            gsap.to(loop, {timeScale: 0.2, duration: 1}); // Casi pausar para ver las obras
        });
        track.addEventListener('mouseleave', () => {
            gsap.to(loop, {timeScale: 1, duration: 1}); // Volver a fluir
        });

        // Soporte táctil básico (Deslizar para mover)
        let mm = gsap.matchMedia();
        mm.add("(max-width: 800px)", () => {
            Observer.create({
                target: window,
                type: "touch,pointer",
                onPress: (self) => self.startScroll = loop.progress(),
                onDrag: (self) => {
                    const delta = self.deltaX * 0.001;
                    loop.progress(loop.progress() - delta);
                }
            });
        });

    </script>
</body>
</html>
