<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oropéndola | El Alma de la Madera</title>
    
    <!-- FUENTES PREMIUM -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Uncial+Antiqua&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- LIBRERÍAS DE ANIMACIÓN (GSAP) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/Draggable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/Observer.min.js"></script>

    <style>
        :root {
            --oro: #eec12d;
            --oro-glow: rgba(238, 193, 45, 0.4);
            --madera-oscura: #1a0d0a;
            --blanco: #fcfaf7;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Libre Baskerville', serif;
            background-color: var(--madera-oscura);
            color: var(--blanco);
            overflow-x: hidden;
            overflow-y: auto; /* Permitir scroll */
            min-height: 100vh;
            width: 100vw;
            cursor: default;
        }

        /* FONDO ESPECTACULAR PARALLAX */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('premium_bg.png');
            background-size: cover;
            background-position: center;
            z-index: -2;
            transform: scale(1.1);
        }

        #bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent 30%, rgba(0,0,0,0.6) 100%);
            z-index: -1;
        }

        /* CONTENEDOR PRINCIPAL */
        main {
            position: relative;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 5vh 20px 80px; /* Padding lateral y fondo */
            z-index: 10;
        }

        /* HEADER & LOGO */
        .header-wrap {
            text-align: center;
            margin-bottom: 2rem;
            perspective: 1000px;
        }

        .logo-box {
            position: relative;
            width: 130px;
            height: 130px;
            margin: 0 auto 1.5rem;
            border-radius: 50%;
            padding: 5px;
            background: linear-gradient(135deg, var(--oro), transparent, var(--oro));
            box-shadow: 0 0 30px var(--oro-glow);
        }

        .logo-box img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            background: white;
            border: 2px solid var(--madera-oscura);
        }

        h1 {
            font-family: 'Uncial Antiqua', cursive;
            font-size: clamp(2.5rem, 8vw, 3.5rem);
            color: var(--oro);
            text-shadow: 0 5px 15px rgba(0,0,0,0.8);
            letter-spacing: 2px;
        }

        .tagline {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            opacity: 0.7;
            margin-top: 5px;
        }

        /* BOTONES ORGÁNICOS */
        .social-hub {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 90%;
            max-width: 400px;
            margin-bottom: 30px;
        }

        .btn-organic {
            position: relative;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            padding: 16px 25px;
            border-radius: 12px;
            text-decoration: none;
            color: var(--blanco);
            display: flex;
            align-items: center;
            gap: 20px;
            overflow: hidden;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        /* EL "GLOW" DE LA BETA */
        .btn-organic::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(238, 193, 45, 0.1), transparent);
            transition: left 0.6s ease;
        }

        .btn-organic:hover {
            border-color: var(--oro);
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(238, 193, 45, 0.15);
        }

        .btn-organic:hover::before {
            left: 100%;
        }

        .btn-organic i {
            font-size: 1.4rem;
            color: var(--oro);
            filter: drop-shadow(0 0 5px var(--oro-glow));
        }

        .btn-organic span {
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            font-size: 0.95rem;
            letter-spacing: 1px;
        }

        /* SPOTLIGHT STAGE (3 Slots) */
        .carousel-container {
            position: relative;
            margin-top: 20px;
            width: 100vw;
            height: clamp(220px, 40vh, 320px);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1200px;
        }

        .carousel-track {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .carousel-item {
            position: absolute;
            width: min(65vw, 280px);
            height: min(50vw, 210px);
            border-radius: 18px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            transition: border-color 0.4s ease, box-shadow 0.4s ease;
            will-change: transform, opacity, filter;
            pointer-events: none;
        }

        .carousel-item.active {
            pointer-events: auto;
            border-color: var(--oro);
            box-shadow: 0 0 30px var(--oro-glow);
            z-index: 10;
        }

        .carousel-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        .carousel-label {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 15px;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            font-family: 'Montserrat', sans-serif;
            font-size: 0.75rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--oro);
            text-align: center;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.4s ease;
        }

        .carousel-item.active .carousel-label {
            opacity: 1;
            transform: translateY(0);
        }

        /* PAGINACIÓN (DOTS) */
        .carousel-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 10px;
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--oro);
            opacity: 0.2;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .dot.active {
            opacity: 1;
            transform: scale(1.5);
            box-shadow: 0 0 10px var(--oro);
        }

        /* INDICADOR DE SCROLL */
        .scroll-hint {
            position: relative;
            margin-top: 40px;
            font-family: 'Uncial Antiqua', cursive;
            font-size: 0.8rem;
            color: var(--oro);
            opacity: 0.5;
            letter-spacing: 4px;
        }

        /* RESPONSIVE */
        @media (max-width: 480px) {
            h1 { font-size: 2.2rem; }
            .logo-box { width: 110px; height: 110px; }
            .carousel-item { width: 75vw; height: 55vw; }
        }
    </style>
</head>
<body>

    <div id="bg-canvas"></div>
    <div id="bg-overlay"></div>

    <main>
        <header class="header-wrap">
            <div class="logo-box">
                <img src="logo.png.jpeg" alt="Oropéndola Logo">
            </div>
            <h1>Oropéndola</h1>
            <div class="tagline">Arte, Madera y Tradición</div>
        </header>

        <section class="social-hub">
            <a href="https://wa.me/50683336102" class="btn-organic" target="_blank">
                <i class="fab fa-whatsapp"></i>
                <span>PEDIDOS WHATSAPP</span>
            </a>
            <a href="https://www.instagram.com/croropendola/" class="btn-organic" target="_blank">
                <i class="fab fa-instagram"></i>
                <span>GALERÍA INSTAGRAM</span>
            </a>
            <a href="https://www.facebook.com/share/1BePMb6QJY/" class="btn-organic" target="_blank">
                <i class="fab fa-facebook-f"></i>
                <span>FACEBOOK OFICIAL</span>
            </a>
            <a href="mailto:oropendolartesanias@gmail.com" class="btn-organic">
                <i class="fas fa-envelope"></i>
                <span>CONTACTO DIRECTO</span>
            </a>
        </section>

        <div class="scroll-hint">✦ NUESTRAS OBRAS ✦</div>

        <div class="carousel-container">
            <div class="carousel-track" id="track">
                <div class="carousel-item"><img src="Casavictoriana1.jpeg" alt="Casa Victoriana"><div class="carousel-label">Victoriana</div></div>
                <div class="carousel-item"><img src="Casapachuca1.jpeg" alt="Casa Pachuca"><div class="carousel-label">Pachuca</div></div>
                <div class="carousel-item"><img src="Casatipica1.jpeg" alt="Casa Típica"><div class="carousel-label">Típica</div></div>
                <div class="carousel-item"><img src="Casacolonial1.jpeg" alt="Casa Colonial"><div class="carousel-label">Colonial</div></div>
                <div class="carousel-item"><img src="Casazocalo1.jpeg" alt="Casa Zócalo"><div class="carousel-label">Zócalo</div></div>
                <div class="carousel-item"><img src="Casaexpresidente1.jpeg" alt="Casa Ex Presidente"><div class="carousel-label">Patrimonio</div></div>
                <div class="carousel-item"><img src="Casaobrera1.jpeg" alt="Casa Obrera"><div class="carousel-label">Obrera</div></div>
            </div>
        </div>
        <div class="carousel-dots" id="dots"></div>
    </main>

    <script>
        // CONFIGURACIÓN DE GSAP
        console.log("Iniciando Motor Kinético Oropéndola 2026...");

        // 1. Efecto Parallax Suave del Fondo
        gsap.to("#bg-canvas", {
            duration: 20,
            scale: 1.2,
            repeat: -1,
            yoyo: true,
            ease: "sine.inOut"
        });

        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 20;
            const y = (e.clientY / window.innerHeight - 0.5) * 20;
            gsap.to("#bg-canvas", { x: x, y: y, duration: 1, ease: "power1.out" });
        });

        // 2. Animación de Entrada de Elementos
        const tl = gsap.timeline();
        tl.from(".logo-box", { scale: 0, rotation: 180, duration: 1.5, ease: "elastic.out(1, 0.3)" })
          .from("h1", { y: 50, opacity: 0, duration: 1 }, "-=0.5")
          .from(".btn-organic", { 
              x: -50, 
              opacity: 0, 
              stagger: 0.1, 
              duration: 0.8, 
              ease: "power3.out" 
          }, "-=0.5")
          .from(".carousel-item", { 
              scale: 0.5, 
              opacity: 0, 
              stagger: 0.1, 
              duration: 1, 
              ease: "back.out(1.7)" 
          }, "-=1");

        // 3. LÓGICA DE SPOTLIGHT (3 SLOTS)
        const items = gsap.utils.toArray(".carousel-item");
        const dotsContainer = document.getElementById("dots");
        let currentIndex = 0;
        const totalItems = items.length;

        // Crear Dots
        items.forEach((_, i) => {
            const dot = document.createElement("div");
            dot.className = `dot ${i === 0 ? 'active' : ''}`;
            dot.onclick = () => goToIndex(i);
            dotsContainer.appendChild(dot);
        });
        const dots = document.querySelectorAll(".dot");

        function updateCarousel() {
            items.forEach((item, i) => {
                let diff = i - currentIndex;
                
                // Manejar loop infinito para la diff
                if (diff > totalItems / 2) diff -= totalItems;
                if (diff < -totalItems / 2) diff += totalItems;

                let xPos = diff * 120; // Espaciado lateral
                let scale = 1 - Math.abs(diff) * 0.25;
                let zIndex = 10 - Math.abs(diff);
                let opacity = 1 - Math.abs(diff) * 0.6;
                let blur = Math.abs(diff) * 4;

                gsap.to(item, {
                    x: xPos + "%",
                    scale: scale,
                    zIndex: zIndex,
                    opacity: opacity,
                    filter: `blur(${blur}px)`,
                    duration: 0.8,
                    ease: "power3.out"
                });

                item.classList.toggle("active", i === currentIndex);
            });

            dots.forEach((dot, i) => dot.classList.toggle("active", i === currentIndex));
        }

        function goToIndex(index) {
            currentIndex = gsap.utils.wrap(0, totalItems, index);
            updateCarousel();
        }

        function next() { goToIndex(currentIndex + 1); }
        function prev() { goToIndex(currentIndex - 1); }

        // Auto-avance
        let autoPlay = setInterval(next, 5000);

        // Interacción
        const track = document.getElementById("track");
        
        // Soporte Swipe con Observer
        Observer.create({
            target: track,
            type: "touch,pointer",
            onLeft: () => { next(); resetAutoPlay(); },
            onRight: () => { prev(); resetAutoPlay(); },
            tolerance: 50
        });

        function resetAutoPlay() {
            clearInterval(autoPlay);
            autoPlay = setInterval(next, 5000);
        }

        // Inicializar
        updateCarousel();

    </script>
</body>
</html>
