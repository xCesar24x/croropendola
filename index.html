<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oropéndola | Social Hub</title>
    
    <!-- FUENTES -->
    <link href="https://fonts.googleapis.com/css2?family=Uncial+Antiqua&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        :root {
            --madera-oscura: #31160e;
            --madera-media: #482318;
            --madera-clara: #bc8a5f;
            --oro: #eec12d;
            --fondo: #1a0d0a;
            --blanco: #ffffff;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Libre Baskerville', serif;
            background-color: var(--fondo);
            background-image: 
                linear-gradient(rgba(26, 13, 10, 0.8), rgba(26, 13, 10, 0.9)),
                url('https://www.transparenttextures.com/patterns/dark-wood.png');
            color: var(--blanco);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* FONDO DINÁMICO */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.4) 100%);
            z-index: -1;
        }

        .container {
            width: 100%;
            max-width: 480px;
            padding: 40px 20px;
            text-align: center;
            z-index: 1;
        }

        /* HEADER */
        header {
            margin-bottom: 40px;
            animation: fadeInDown 1s ease;
        }

        .logo-container {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }

        .logo-main {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid var(--oro);
            box-shadow: 0 0 20px rgba(238, 193, 45, 0.3);
            object-fit: cover;
            background: white;
        }

        h1 {
            font-family: 'Uncial Antiqua', cursive;
            font-size: 2.2rem;
            color: var(--oro);
            margin-bottom: 5px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .tagline {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 4px;
            color: var(--madera-clara);
            text-transform: uppercase;
            font-weight: 400;
        }

        /* LINKS HUB */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 50px;
        }

        .social-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 18px 25px;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: var(--blanco);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.8s ease backwards;
        }

        .social-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--oro);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .social-card i {
            font-size: 1.5rem;
            width: 40px;
            color: var(--oro);
        }

        .social-card span {
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            flex-grow: 1;
            text-align: center;
            margin-right: 40px;
        }

        .social-card .arrow {
            position: absolute;
            right: 20px;
            font-size: 0.8rem;
            opacity: 0.5;
            transition: transform 0.3s ease;
        }

        .social-card:hover .arrow {
            transform: translateX(5px);
            opacity: 1;
        }

        /* GALERÍA ITERATIVA */
        .gallery-section {
            width: 100%;
            background: rgba(0,0,0,0.3);
            padding: 30px 0;
            border-top: 1px solid var(--madera-media);
            border-bottom: 1px solid var(--madera-media);
        }

        .gallery-title {
            font-family: 'Uncial Antiqua', cursive;
            font-size: 1.2rem;
            color: var(--madera-clara);
            margin-bottom: 20px;
            text-align: center;
        }

        .marquee-container {
            width: 100%;
            overflow: hidden;
            position: relative;
        }

        .marquee-track {
            display: flex;
            width: max-content;
            animation: scroll 30s linear infinite;
        }

        .marquee-item {
            width: 180px;
            height: 180px;
            margin: 0 10px;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid var(--madera-media);
            flex-shrink: 0;
        }

        .marquee-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .marquee-item:hover img {
            transform: scale(1.1);
        }

        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* FOOTER */
        footer {
            padding: 40px 20px;
            text-align: center;
            opacity: 0.6;
            font-size: 0.8rem;
            color: var(--madera-clara);
        }

        /* ANIMACIONES PERSONALIZADAS */
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }
        .delay-4 { animation-delay: 0.4s; }
        .delay-5 { animation-delay: 0.5s; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* RESPONSIVE */
        @media (max-width: 400px) {
            h1 { font-size: 1.8rem; }
            .logo-main { width: 100px; height: 100px; }
        }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>

    <div class="container border-glow">
        <header>
            <div class="logo-container">
                <img src="logo.png.jpeg" alt="Oropéndola Logo" class="logo-main animate__animated animate__pulse animate__infinite">
            </div>
            <h1>Oropéndola</h1>
            <div class="tagline">Arte, Madera y Tradición</div>
        </header>

        <section class="links-container">
            <!-- WHATSAPP -->
            <a href="https://wa.me/50683336102" class="social-card delay-1">
                <i class="fab fa-whatsapp"></i>
                <span>WhatsApp Catálogo</span>
                <i class="fas fa-chevron-right arrow"></i>
            </a>

            <!-- INSTAGRAM -->
            <a href="https://www.instagram.com/croropendola/" class="social-card delay-2">
                <i class="fab fa-instagram"></i>
                <span>Instagram Galería</span>
                <i class="fas fa-chevron-right arrow"></i>
            </a>

            <!-- FACEBOOK -->
            <a href="https://www.facebook.com/share/1BePMb6QJY/" class="social-card delay-3">
                <i class="fab fa-facebook-f"></i>
                <span>Facebook Oficial</span>
                <i class="fas fa-chevron-right arrow"></i>
            </a>

            <!-- EMAIL -->
            <a href="mailto:oropendolartesanias@gmail.com" class="social-card delay-4">
                <i class="fas fa-envelope"></i>
                <span>Cotización por Email</span>
                <i class="fas fa-chevron-right arrow"></i>
            </a>

            <!-- PORTFOLIO / GALLERY -->
            <a href="#galeria" class="social-card delay-5">
                <i class="fas fa-images"></i>
                <span>Nuestra Colección</span>
                <i class="fas fa-chevron-right arrow"></i>
            </a>
        </section>
    </div>

    <!-- GALLERY SECTION -->
    <section class="gallery-section" id="galeria">
        <div class="gallery-title">Galería en Movimiento</div>
        <div class="marquee-container">
            <div class="marquee-track" id="marquee-track">
                <!-- Images will be cloned via JS check -->
                <div class="marquee-item"><img src="Casavictoriana1.jpeg" alt="Casa Victoriana"></div>
                <div class="marquee-item"><img src="Casapachuca1.jpeg" alt="Barrio Pachuca"></div>
                <div class="marquee-item"><img src="Casatipica1.jpeg" alt="Casa Típica"></div>
                <div class="marquee-item"><img src="Casacolonial1.jpeg" alt="Casa Colonial"></div>
                <div class="marquee-item"><img src="Casazocalo1.jpeg" alt="Estilo Zócalo"></div>
                <div class="marquee-item"><img src="Casaexpresidente1.jpeg" alt="Patrimonio"></div>
                <div class="marquee-item"><img src="Casaobrera1.jpeg" alt="Casa Obrera"></div>
                <!-- Clones for infinite scroll -->
                <div class="marquee-item"><img src="Casavictoriana1.jpeg" alt="Casa Victoriana"></div>
                <div class="marquee-item"><img src="Casapachuca1.jpeg" alt="Barrio Pachuca"></div>
                <div class="marquee-item"><img src="Casatipica1.jpeg" alt="Casa Típica"></div>
                <div class="marquee-item"><img src="Casacolonial1.jpeg" alt="Casa Colonial"></div>
                <div class="marquee-item"><img src="Casazocalo1.jpeg" alt="Estilo Zócalo"></div>
                <div class="marquee-item"><img src="Casaexpresidente1.jpeg" alt="Patrimonio"></div>
                <div class="marquee-item"><img src="Casaobrera1.jpeg" alt="Casa Obrera"></div>
            </div>
        </div>
    </section>

    <footer>
        <p>© 2026 Oropéndola Artesanías en Madera</p>
        <p>Heredia, Costa Rica</p>
    </footer>

    <script>
        // Log to console for debugging
        console.log("Oropéndola Hub Initialized");

        // Simple observer for entrance animations if needed
        const observerOptions = {
            threshold: 0.1
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('animate__fadeInUp');
                }
            });
        }, observerOptions);

        document.querySelectorAll('.social-card').forEach(card => {
            observer.observe(card);
        });
    </script>
</body>
</html>
